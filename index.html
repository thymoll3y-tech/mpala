window.addEventListener('error',function(e){

  if(!e.message||e.message==='Script error.'){ e.preventDefault(); return true; }
},true);

<script>
(function(){
  var SB_URL='https://hmtgwcfaoocacfipzrkl.supabase.co';
  var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtdGd3Y2Zhb29jYWNmaXB6cmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDAyMjgsImV4cCI6MjA5NjYxNjIyOH0.kGi2QU3sULJAGidDQY-RzqHpwPGqqcmem5OBQ3TyvS8';
  var HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
  var SKIP={'motion_auth':1,'cmd_kbd_seen':1,'cmd_phone_mode':1,'cmd_theme':1,'cmd_palette':1,'cmd_daily_collapsed':1,'_lastBackupDate':1,'cmd_lock_mode':1,'motion_passcode':1,'motion_password':1,'motion_bio':1,'motion_bio_cred_id':1,'cmd_chart_migrated_v1':1};
  var _origSet=localStorage.setItem.bind(localStorage);
  var _origGet=localStorage.getItem.bind(localStorage);
  var _origClear=localStorage.clear.bind(localStorage);
  var _syncing=false;
  var _pushTimer=null;

  function setSyncStatus(state){}

  function getPayload(){
    var d={};
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&!SKIP[k]) d[k]=localStorage.getItem(k);
    }
    return d;
  }

  function doPush(){
    var payload=JSON.stringify(getPayload());
    setSyncStatus('saving');
    // Upsert single row with id=1
    fetch(SB_URL+'/rest/v1/carry_data?on_conflict=id',{
      method:'POST',
      headers:Object.assign({},HEADERS,{'Prefer':'resolution=merge-duplicates'}),
      body:JSON.stringify({id:1,data:payload,updated_at:new Date().toISOString()})
    })
    .then(function(r){
      if(r.ok) setSyncStatus('saved');
      else setSyncStatus('error');
    })
    .catch(function(){setSyncStatus('error');});
  }

  window._kvPush=function(){
    if(_syncing) return;
    clearTimeout(_pushTimer);
    _pushTimer=setTimeout(function(){
      var ts=Date.now();
      _origSet('_localTs',ts.toString());
      _lastSeenTs=ts;
      doPush();
    },0);
  };

  localStorage.setItem=function(k,v){
    _origSet(k,v);
    if(!_syncing&&!SKIP[k]) window._kvPush();
  };

  // Keys that are arrays of objects with unique IDs — merge instead of overwrite
  var MERGE_KEYS={'cmd_trade_journal':1,'cmd_trophies':1,'cmd_plans':1,'cmd_notes':1,'cmd_trash_plans':1,'cmd_trash_notes':1,'cmd_weekly_reviews':1,'cmd_trash_weekly_reviews':1};

  // Tombstones: deleted ids per key so deletes stick across devices (7 day TTL)
  var TOMB_TTL=7*24*60*60*1000;
  function getTombs(){try{return JSON.parse(_origGet('cmd_tombstones')||'{}');}catch(e){return {};}}
  function setTombs(t){_origSet('cmd_tombstones',JSON.stringify(t));}
  function pruneTombs(t){
    var now=Date.now();
    Object.keys(t).forEach(function(key){
      Object.keys(t[key]).forEach(function(id){if(now-t[key][id]>TOMB_TTL)delete t[key][id];});
      if(!Object.keys(t[key]).length)delete t[key];
    });
    return t;
  }
  window._tomb=function(key,id){
    var t=getTombs();
    if(!t[key])t[key]={};
    t[key][id]=Date.now();
    setTombs(pruneTombs(t));
  };
  window._untomb=function(key,id){
    var t=getTombs();
    if(t[key]&&t[key][id]!==undefined){delete t[key][id];setTombs(t);}
  };
  function mergeTombs(localT,remoteT){
    var out={};
    [localT,remoteT].forEach(function(src){
      Object.keys(src||{}).forEach(function(key){
        if(!out[key])out[key]={};
        Object.keys(src[key]).forEach(function(id){
          if(!out[key][id]||src[key][id]>out[key][id])out[key][id]=src[key][id];
        });
      });
    });
    return pruneTombs(out);
  }

  function mergeArrayById(localStr,remoteStr,tombsForKey){
    try{
      var local=JSON.parse(localStr||'[]');
      var remote=JSON.parse(remoteStr||'[]');
      if(!Array.isArray(local)||!Array.isArray(remote)) return remoteStr;
      var map={};
      local.forEach(function(x){if(x&&x.id)map[x.id]=x;});
      remote.forEach(function(x){if(x&&x.id)map[x.id]=x;});
      // Drop tombstoned ids — deleted items stay deleted
      if(tombsForKey){Object.keys(tombsForKey).forEach(function(id){delete map[id];});}
      var merged=Object.values(map).sort(function(a,b){return b.id-a.id;});
      return JSON.stringify(merged);
    }catch(e){return remoteStr;}
  }

  function applyRemoteData(dataStr){
    try{
      var d=JSON.parse(dataStr);
      if(!d||typeof d!=='object') return;
      var auth=_origGet('motion_auth');
      // Preserve all local-only keys across the clear
      var preserved={};
      Object.keys(SKIP).forEach(function(k){var v=_origGet(k);if(v!==null)preserved[k]=v;});
      // Merge tombstones first so deletes from either device are honored
      var remoteTombs={};
      try{remoteTombs=JSON.parse(d['cmd_tombstones']||'{}');}catch(te){}
      var tombs=mergeTombs(getTombs(),remoteTombs);
      // For array keys, merge local + remote (minus tombstoned ids) before clearing
      var merges={};
      Object.keys(MERGE_KEYS).forEach(function(k){
        var localVal=_origGet(k);
        if(localVal&&d[k]){
          merges[k]=mergeArrayById(localVal,d[k],tombs[k]);
        } else if(localVal||d[k]){
          merges[k]=mergeArrayById(localVal||'[]',d[k]||'[]',tombs[k]);
        }
      });
      _origClear();
      Object.keys(preserved).forEach(function(k){_origSet(k,preserved[k]);});
      setTombs(tombs);
      Object.keys(d).forEach(function(k){
        if(!SKIP[k]) _origSet(k,merges[k]||d[k]);
      });
      // Write back any local keys that weren't in remote (local-only items)
      Object.keys(merges).forEach(function(k){
        if(!d[k]) _origSet(k,merges[k]);
      });
    }catch(e){}
  }

  // Pull from Supabase
  function sbPull(cb){
    fetch(SB_URL+'/rest/v1/carry_data?id=eq.1&select=data',{headers:HEADERS})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(rows&&rows.length&&rows[0].data){
        applyRemoteData(rows[0].data);
        setSyncStatus('saved');
      } else { setSyncStatus(''); }
      _syncing=false;
      if(cb) cb();
    })
    .catch(function(){_syncing=false;setSyncStatus('');if(cb)cb();});
  }

  // Lightweight polling for cross-device sync (every 4s)
  // More reliable than raw WebSocket on iOS WKWebView
  var _pollTimer=null;
  function sbSubscribe(){
    if(_pollTimer) clearInterval(_pollTimer);
    _pollTimer=setInterval(function(){
      if(_syncing) return;
      fetch(SB_URL+'/rest/v1/carry_data?id=eq.1&select=data,updated_at',{headers:HEADERS})
      .then(function(r){return r.json();})
      .then(function(rows){
        if(rows&&rows.length&&rows[0].data){
          var remoteTs=new Date(rows[0].updated_at).getTime()||0;
          var localTs=parseInt(_origGet('_localTs')||'0',10);
          if(remoteTs>localTs){
            // Remote is newer than our last write — pull it
            _origSet('_localTs',(remoteTs-1).toString());
            // Snapshot old values before applying
            var _oldMoney=_origGet('cmd_money');
            var _oldTrades=_origGet('cmd_trade_journal');
            var _oldTrophies=_origGet('cmd_trophies');
            var _oldPlans=_origGet('cmd_plans');
            var _oldNotes=_origGet('cmd_notes');
            var _oldChecks=_origGet('cmd_daily_checks');
            var _oldMDP=_origGet('cmd_mdp_checks');
            var _oldScaling=_origGet('cmd_scaling_checks');
            var _oldInvAmts=_origGet('cmd_inv_amounts');
            var _oldROI=_origGet('cmd_roi');
            var _oldMonthly=_origGet('cmd_monthly_income');
            var _oldGoal=_origGet('cmd_monthly_goal');
            var _oldFut=_origGet('cmd_fut_count');
            var _oldCFD=_origGet('cmd_cfd_count');
            var _oldWeekly=_origGet('cmd_weekly_'+getWeekKey());
            var _oldReviews=_origGet('cmd_weekly_reviews');
            var _oldWrTrash=_origGet('cmd_trash_weekly_reviews');

            _syncing=true;
            applyRemoteData(rows[0].data);
            _syncing=false;

            // Silently update only what changed — no scroll, no flicker
            try{
              var _newMoney=_origGet('cmd_money');
              var _newTrades=_origGet('cmd_trade_journal');
              var _newTrophies=_origGet('cmd_trophies');
              var _newPlans=_origGet('cmd_plans');
              var _newNotes=_origGet('cmd_notes');
              var _newChecks=_origGet('cmd_daily_checks');
              var _newMDP=_origGet('cmd_mdp_checks');
              var _newScaling=_origGet('cmd_scaling_checks');
              var _newInvAmts=_origGet('cmd_inv_amounts');
              var _newROI=_origGet('cmd_roi');
              var _newMonthly=_origGet('cmd_monthly_income');
              var _newGoal=_origGet('cmd_monthly_goal');
              var _newFut=_origGet('cmd_fut_count');
              var _newCFD=_origGet('cmd_cfd_count');
              var _newWeekly=_origGet('cmd_weekly_'+getWeekKey());
              var _newReviews=_origGet('cmd_weekly_reviews');
              var _newWrTrash=_origGet('cmd_trash_weekly_reviews');

              if(_newMoney!==_oldMoney||_newMonthly!==_oldMonthly||_newGoal!==_oldGoal){
                money=parseFloat(_newMoney||'0');
                updateMoneyDisplay();updateMonthlyDisplay();
              }
              if(_newTrophies!==_oldTrophies) renderTrophies();
              if(_newTrades!==_oldTrades){ renderTradeJournal();pnlRender();buildTradeDots();renderJournalSummary(); }
              else { pnlRender(); } // always re-render calendar from current data
              if(_newPlans!==_oldPlans){ renderPlans();renderIdeasPlans(); }
              if(_newNotes!==_oldNotes) renderNotes();
              if(_newChecks!==_oldChecks){ restoreDailyChecklistState();updateConfGrade(); }
              if(_newMDP!==_oldMDP){ restoreMDPChecklistState();updateMDPPhase();syncOverviewMDP(); }
              if(_newScaling!==_oldScaling) restoreScalingChecklistState();
              if(_newInvAmts!==_oldInvAmts||_newROI!==_oldROI){
                investAmounts=JSON.parse(_newInvAmts||'{}');
                roiRates=JSON.parse(_newROI||'{}');
                investments.forEach(function(i){if(investAmounts[i.name]!==undefined)i.amount=investAmounts[i.name];});
                buildROICards();updatePortfolioSummary();
                if(activeInvestment){
                  var _inv=investments.find(function(x){return x.name===activeInvName;});
                  if(_inv){activeInvestment=_inv;openInvestDetail(_inv);}
                }
              }
              if(_newFut!==_oldFut||_newCFD!==_oldCFD) initScalingTrackers();
              if(_newWeekly!==_oldWeekly) updateWeeklySummaryDisplay();
              if(_newReviews!==_oldReviews && _wrEditingId===null){ renderWeeklyReviews();renderJournalSummary(); }
              if(_newWrTrash!==_oldWrTrash && typeof renderIdeasTrash==='function') renderIdeasTrash();
              updateDashboardExtras();
            }catch(err){}
          }
        }
      })
      .catch(function(){});
    },4000);
  }

  // Pull-to-refresh: pull + merge remote, re-render, then push merged state up
  window._ptrSync=function(done){
    fetch(SB_URL+'/rest/v1/carry_data?id=eq.1&select=data,updated_at',{headers:HEADERS})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(rows&&rows.length&&rows[0].data){
        var remoteTs=new Date(rows[0].updated_at).getTime()||0;
        _syncing=true;
        applyRemoteData(rows[0].data);
        _syncing=false;
        _origSet('_localTs',(remoteTs-1).toString());
      }
      try{if(window._fullRender)window._fullRender();}catch(e){}
      window._kvPush();
      if(done)done();
    })
    .catch(function(){if(done)done();});
  };

  // Boot load — always pull from Supabase, then start polling
  // ── Auto-backup: runs once per day on first open, silently ──
  function autoBackup(){
    var today=new Date().toISOString().slice(0,10); // YYYY-MM-DD
    var lastBackup=_origGet('_lastBackupDate');
    if(lastBackup===today) return; // already backed up today
    // Gather all localStorage data (same as _kvPush snapshot)
    var d={};
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&!SKIP[k]&&k!=='_localTs'&&k!=='_lastBackupDate') d[k]=localStorage.getItem(k);
    }
    var payload=JSON.stringify(d);
    // Upsert today's backup row
    fetch(SB_URL+'/rest/v1/carry_backups',{
      method:'POST',
      headers:Object.assign({},HEADERS,{'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body:JSON.stringify({id:today,data:payload})
    }).then(function(){
      _origSet('_lastBackupDate',today);
      // Prune backups older than 30 days
      var cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
      var cutoffStr=cutoff.toISOString().slice(0,10);
      fetch(SB_URL+'/rest/v1/carry_backups?id=lt.'+cutoffStr,{
        method:'DELETE',headers:HEADERS
      }).catch(function(){});
    }).catch(function(){});
  }

  window._kvLoad=function(cb){
    _syncing=true;
    setSyncStatus('loading');
    fetch(SB_URL+'/rest/v1/carry_data?id=eq.1&select=data,updated_at',{headers:HEADERS})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(rows&&rows.length&&rows[0].data){
        var remoteTs=new Date(rows[0].updated_at).getTime()||0;
        var localTs=parseInt(_origGet('_localTs')||'0',10);
        if(remoteTs>localTs){
          applyRemoteData(rows[0].data);
          _origSet('_localTs',(remoteTs-1).toString());
          _lastSeenTs=remoteTs;
        }
        setSyncStatus('saved');
      } else { setSyncStatus(''); }
      _syncing=false;
      if(cb) cb();
      setTimeout(sbSubscribe,500);
      // Run backup after data is loaded — silent, non-blocking
      setTimeout(autoBackup,3000);
    })
    .catch(function(){
      _syncing=false;setSyncStatus('');
      if(cb) cb();
      setTimeout(sbSubscribe,500);
    });
  };
})();
</script>

.topbar-nav{position:relative;display:none;flex-shrink:0;margin-right:auto;}
.topbar-nav.visible{display:block;}
.topbar-nav-trigger{display:flex;align-items:center;gap:10px;background:rgba(212,98,42,0.08);border:1px solid rgba(212,98,42,0.28);padding:7px 14px;border-radius:10px;cursor:pointer;transition:all .25s var(--ease-silk);user-select:none;white-space:nowrap;}
.topbar-nav-trigger:hover{border-color:var(--gold);background:rgba(212,98,42,0.15);}
.float-logo{font-family:var(--font-serif);font-size:15px;font-weight:900;letter-spacing:3px;color:var(--gold);font-style:normal;}
.float-caret{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:transform .3s var(--ease-silk);flex-shrink:0;}
.topbar-nav.open .float-caret{transform:rotate(180deg)}
.float-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:210px;background:var(--void);border:1px solid var(--border2);backdrop-filter:blur(32px);border-radius:14px;overflow:hidden;max-height:0;opacity:0;pointer-events:none;transition:max-height .38s var(--ease-silk),opacity .28s var(--ease-silk);box-shadow:0 24px 48px rgba(0,0,0,0.55);z-index:600;}
.topbar-nav.open .float-menu{max-height:500px;opacity:1;pointer-events:all;}
.float-menu-section{padding:6px 8px;border-bottom:1px solid var(--border);}
.float-menu-section:last-child{border-bottom:none}
.float-menu-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;font-family:var(--font-sans);font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.2px;border:none;background:none;width:100%;text-align:left;}
.float-menu-item:hover{background:var(--gold-dim);color:var(--gold)}
.float-menu-item.active{color:var(--gold);background:var(--gold-dim)}
.float-menu-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .15s;}
.float-menu-item:hover .float-menu-dot,.float-menu-item.active .float-menu-dot{background:var(--gold)}
.float-menu-dot.rose{background:var(--rose)}
.float-menu-dot.sage{background:var(--sage)}
.float-menu-dot.azure{background:var(--azure)}
.float-sidebar-toggle{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 16px);margin:6px 8px 8px;padding:9px 12px;border-radius:10px;border:1px solid rgba(212,98,42,0.3);background:rgba(212,98,42,0.08);color:var(--gold);font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s;}
.float-sidebar-toggle:hover{background:rgba(212,98,42,0.16);border-color:var(--gold);}

/* ═══════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════ */
.dashboard{
  display:grid;
  grid-template-columns:280px 1fr;
  min-height:100vh;
  transition:grid-template-columns .4s var(--ease-silk);
}
.dashboard.fullscreen{
  grid-template-columns:0px 1fr;
}
.dashboard.fullscreen .sidebar{
  width:0;
  overflow:hidden;
  border-right:none;
  opacity:0;
  pointer-events:none;
  transition:width .4s var(--ease-silk),opacity .3s,border-right .4s;
}
.sidebar{
  transition:width .4s var(--ease-silk),opacity .3s var(--ease-silk);
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar{
  background:var(--void);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:32px 0 24px;
}
.sidebar::-webkit-scrollbar{width:0}

.sidebar-brand{
  padding:0 28px 32px;
  border-bottom:1px solid var(--border);
  margin-bottom:24px;
}
.brand-name{
  font-family:var(--font-serif);
  font-size:32px;
  font-weight:900;
  letter-spacing:5px;
  color:var(--gold);
  line-height:1;
  font-style:normal;
}
.brand-sub{
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:3px;
  color:var(--text3);
  margin-top:6px;
  text-transform:uppercase;
}

/* MONEY MADE WIDGET */
.money-widget{
  margin:0 16px 24px;
  background:linear-gradient(135deg,rgba(212,98,42,0.09) 0%,rgba(212,98,42,0.03) 100%);
  border:1px solid rgba(212,98,42,0.22);
  border-radius:16px;
  padding:20px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:border-color .3s var(--ease-silk),box-shadow .3s;
}
@media (hover:hover){
  .money-widget:hover{
    border-color:rgba(212,98,42,0.45);
    box-shadow:0 8px 32px rgba(212,98,42,0.12);
  }
}
.money-label{
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:3px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:8px;
}
.money-amount{
  font-family:var(--font-serif);
  font-size:clamp(18px,4.5vw,34px);
  font-weight:700;
  color:var(--gold2);
  letter-spacing:-0.5px;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
  line-height:1.1;
  transition:all .3s var(--ease-silk);
  font-style:normal;
  word-break:break-all;
  overflow-wrap:anywhere;
  white-space:normal;
}
.money-sub{
  font-size:10px;
  color:var(--text3);
  margin-top:6px;
  font-family:var(--font-mono);
  letter-spacing:1px;
}
.money-edit-hint{
  font-size:9px;
  color:var(--text3);
  margin-top:8px;
  opacity:.6;
  font-family:var(--font-mono);
  letter-spacing:1px;
}

/* MONEY INPUT PANEL */
.money-input-panel{
  display:none;
  padding:16px 20px 18px;
  border-top:1px solid var(--border);
  background:var(--surface);
  gap:8px;
  flex-direction:column;
}
.money-input-panel.open{display:flex}
.money-input-row{display:flex;gap:8px;align-items:center}
.money-input-field{
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  border-radius:8px;
  padding:8px 12px;
  font-family:var(--font-mono);
  font-size:13px;
  outline:none;
  transition:border-color .2s;
}
.money-input-field:focus{border-color:var(--gold)}
.money-input-field::placeholder{color:var(--text3)}
.btn-gold-sm{
  background:var(--gold);
  color:var(--obsidian);
  border:none;
  padding:8px 14px;
  border-radius:8px;
  font-family:var(--font-sans);
  font-size:11px;
  font-weight:700;
  letter-spacing:.5px;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
@media (hover:hover){
  .btn-gold-sm:hover{background:var(--gold2)}
}
.btn-ghost-sm{
  background:none;
  color:var(--text3);
  border:1px solid var(--border2);
  padding:8px 12px;
  border-radius:8px;
  font-family:var(--font-sans);
  font-size:11px;
  cursor:pointer;
  transition:all .2s;
}
@media (hover:hover){
  .btn-ghost-sm:hover{color:var(--text2);border-color:var(--border3)}
}

/* SIDEBAR NAV */
.sidebar-nav{padding:0 12px}
.nav-group{margin-bottom:8px}
.nav-group-label{
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:3px;
  color:var(--text3);
  padding:4px 14px 6px;
  text-transform:uppercase;
}
.nav-btn{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  padding:10px 14px;
  border-radius:12px;
  border:none;
  background:none;
  color:var(--text2);
  font-family:var(--font-sans);
  font-size:12px;
  font-weight:500;
  letter-spacing:.3px;
  cursor:pointer;
  transition:all .2s var(--ease-silk);
  text-align:left;
  position:relative;
  overflow:hidden;
}
.nav-btn::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:12px;
  opacity:0;
  background:var(--gold-dim);
  transition:opacity .2s;
}
.nav-btn:hover{color:var(--text);transform:translateX(2px)}
.nav-btn:hover::before{opacity:1}
.nav-btn.active{color:var(--gold)}
.nav-btn.active::before{opacity:1}
.nav-icon{
  width:30px;height:30px;
  border-radius:8px;
  background:var(--surface2);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .2s;
  font-size:14px;
}
.nav-btn.active .nav-icon{
  background:var(--gold-dim);
  border-color:var(--gold-dim);
}

.sidebar-footer{
  margin-top:auto;
  padding:20px 28px 0;
  border-top:1px solid var(--border);
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text3);
  letter-spacing:2px;
  line-height:1.8;
}

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.main-content{
  display:flex;
  flex-direction:column;
  min-width:0;
  min-height:100vh;
  background:var(--obsidian);
}

/* TOP BAR */
.topbar{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:12px 20px 12px;
  border-bottom:1px solid var(--gold-dim);
  background:var(--obsidian);
  backdrop-filter:blur(24px);
  position:fixed;
  top:0;
  left:280px;
  right:0;
  z-index:20;
  gap:16px;
  transition:left .4s var(--ease-silk);
}
.dashboard.fullscreen~* .topbar,
body.topbar-full .topbar{left:0;}
.topbar-page{
  font-family:var(--font-serif);
  font-size:18px;
  font-weight:700;
  letter-spacing:2px;
  color:var(--text);
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(10px);
  font-style:normal;
  opacity:0;
  transition:opacity .3s ease, transform .3s ease;
  pointer-events:none;
  white-space:nowrap;
}
.topbar-page.visible{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.dashboard.fullscreen .topbar-page{}
.topbar-date{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text3);
  letter-spacing:2px;
}
.topbar-divider{width:1px;height:16px;background:var(--border2)}
.topbar-money-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--gold-dim);
  border:1px solid var(--gold-dim);
  border-radius:20px;
  padding:6px 14px;
  cursor:pointer;
  transition:all .2s;
}
@media (hover:hover){
  .topbar-money-pill:hover{border-color:var(--gold);box-shadow:0 0 16px var(--gold-glow)}
}
.topbar-money-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--text3)}
.topbar-money-val{font-family:var(--font-serif);font-size:16px;font-weight:700;color:var(--gold2);font-style:normal;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* CONTENT AREA */
.content{padding:68px 20px 16px;flex:1;overflow-y:auto;display:flex;flex-direction:column;}


/* VIEWS */
.view{display:none;animation:viewIn 0.45s cubic-bezier(0.16,1,0.3,1);min-height:calc(100vh - 68px)}
.view.active{display:block;flex:1}
@keyframes viewIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════ */
.reveal{
  opacity:0;
  transform:translateY(24px);
  transition:opacity .7s var(--ease-silk),transform .7s var(--ease-silk);
}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.08s}
.reveal-delay-2{transition-delay:.16s}
.reveal-delay-3{transition-delay:.24s}
.reveal-delay-4{transition-delay:.32s}
.reveal-delay-5{transition-delay:.40s}

/* ═══════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════ */
.page-header{margin-bottom:32px;padding-top:4px}
/* Counter spans in card titles */
.card-title [id^="ctr-"],
.card-title .live-counter{
  margin-left:0;
  flex-shrink:0;
  font-size:9px;
  letter-spacing:1px;
  color:var(--text3);
  font-family:var(--font-mono);
  background:var(--surface2);
  border:1px solid var(--border);
  padding:2px 8px;
  border-radius:10px;
  font-style:normal;
  text-transform:none;
  order:2;
}
/* Push the ::after line to sit between title text and counter */
.card-title::after{order:1}
.page-eyebrow{
  font-family:var(--font-mono);
  font-size:10px;
  letter-spacing:4px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:4px;
}
.page-title{
  font-family:var(--font-serif);
  font-size:clamp(72px,10vw,110px);
  font-weight:900;
  letter-spacing:2px;
  color:var(--text);
  line-height:.88;
  margin-bottom:8px;
  font-style:normal;
}
.page-title em{color:var(--gold);font-style:normal}
.page-sub{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text3);
  letter-spacing:2px;
  margin-top:6px;
  margin-bottom:0;
}

/* ═══════════════════════════════════════
   STAT CARDS
═══════════════════════════════════════ */
.stat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:48px;
}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:24px;
  position:relative;
  overflow:hidden;
  transition:all .4s var(--ease-silk);
  cursor:default;
}
.stat-card::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),transparent);
  opacity:0;
  transition:opacity .4s;
}
@media (hover:hover){
  .stat-card:hover{
    border-color:var(--border2);
    transform:translateY(-3px);
    box-shadow:0 20px 40px rgba(0,0,0,0.4),0 0 0 1px var(--gold-glow);
  }
  .stat-card:hover::after{opacity:.5}
}
.stat-eyebrow{
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:3px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:12px;
}
.stat-value{
  font-family:var(--font-serif);
  font-size:clamp(18px,3vw,36px);
  font-weight:700;
  color:var(--gold2);
  line-height:1;
  letter-spacing:-0.5px;
  font-style:normal;
  word-break:break-all;
  overflow-wrap:anywhere;
  white-space:normal;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
}
.stat-value.sm{font-size:22px;margin-top:6px;letter-spacing:2px}
.stat-note{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text3);
  margin-top:8px;
  letter-spacing:1px;
}

/* ═══════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════ */
.section-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:24px;
  padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.section-title{
  font-family:var(--font-serif);
  font-size:30px;
  font-weight:700;
  letter-spacing:1px;
  color:var(--text);
  font-style:normal;
}
.section-tag{
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:3px;
  color:var(--text3);
  text-transform:uppercase;
}

/* ═══════════════════════════════════════
   LUXURY CARDS / BLOCKS
═══════════════════════════════════════ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px;
  margin-bottom:14px;
  transition:all .4s var(--ease-silk);
  position:relative;
  overflow:hidden;
}
@media (hover:hover){
  .card:hover{
    border-color:var(--border2);
    box-shadow:0 16px 48px rgba(0,0,0,0.3);
  }
  .card:hover .card-accent-line{opacity:1}
}
.card-accent-line{
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:linear-gradient(180deg,transparent,var(--gold),var(--gold2),transparent);
  opacity:0;
  transition:opacity .4s;
  border-radius:0 2px 2px 0;
}

.card-title{
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:3px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:nowrap;
  min-width:0;
}
.card-title.no-collapse{cursor:pointer;-webkit-tap-highlight-color:transparent}
.card-title::after{
  content:'';
  flex:1;
  height:1px;
  min-width:12px;
  background:linear-gradient(90deg,var(--gold),transparent);
}
.card-title.rose{color:var(--gold)}
.card-eyebrow{font-family:var(--font-sans);font-size:15px;letter-spacing:1.5px;color:var(--text);text-transform:uppercase;font-weight:600}

/* ── Daily card collapse ── */
.dc-body{display:grid;grid-template-rows:1fr;transition:grid-template-rows .5s cubic-bezier(0.32,0.72,0,1)}
.dc-body.dc-collapsed{grid-template-rows:0fr}
.dc-inner{overflow:hidden;min-height:0}
.dc-chev{display:inline-flex;align-items:center;flex-shrink:0;opacity:.45;transition:transform .45s cubic-bezier(0.32,0.72,0,1)}
.dc-collapsed-chev{transform:rotate(-90deg)}
#view-daily .card-title,#view-journal .card-title{cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
/* Tight spacing when collapsed — card hugs the title */
.dc-closed>.card-title{margin-bottom:0 !important}
.card.dc-closed{padding-top:20px;padding-bottom:20px;min-height:0}
#view-daily .card,#view-journal .card{margin-bottom:12px !important;margin-top:0 !important}
#view-daily .gap-top,#view-journal .gap-top{margin-top:0 !important}
@media (max-width:600px){#view-daily .g2,#view-journal .g2{gap:0 !important}}
body.phone-mode #view-daily .g2,body.phone-mode #view-journal .g2{gap:0 !important}
#view-daily .card.dc-closed,#view-journal .card.dc-closed{padding-top:16px !important;padding-bottom:16px !important}

/* ═══════════════════════════════════════
   VISUAL POLISH PASS
═══════════════════════════════════════ */

/* 1 — Radial corner glow on stat cards + performance cards — removed */

/* 2 — Topbar title refinement */
.topbar-page{letter-spacing:4px !important}

/* 3 — Tactile press states on touch devices */
@media (hover:none){
  /* Cards */
  .card:active{transform:scale(0.985);transition:transform .08s ease}
  .stat-card:active{transform:scale(0.97);transition:transform .08s ease}
  /* No tap-shrink on cards in Daily, MDP, Scale Up, Trophies — they stay perfectly still */
  #view-daily .card:active,
  #view-journal .card:active,
  #view-mdp .card:active,
  #view-scaling .card:active,
  #view-trophies .card:active,
  #view-daily .stat-card:active,
  #view-journal .stat-card:active,
  #view-mdp .stat-card:active,
  #view-scaling .stat-card:active,
  #view-trophies .stat-card:active{transform:none}
  /* Nav icons */
  #phone-nav button:active .pn-icon{transform:scale(0.82);transition:transform .07s ease}
  /* Trade tracker dots */
  .trade-dot:active{transform:scale(0.88);transition:transform .07s ease}
  /* Generic buttons — scale instead of opacity flash */
  button:active{transform:scale(0.96);transition:transform .07s ease}
  /* But not buttons that have their own scale transform */
  .card:active button{transform:none}
  /* Checklist rows */
  .checklist li:active{background:var(--gold-dim);transition:background .06s ease}
  /* Palette swatches */
  .pal-sw:active{transform:scale(0.91);transition:transform .07s ease}
  /* Settings rows */
  .set-row:active,.acct-row:active,.lock-opt:active{background:var(--gold-dim);transition:background .06s ease}
  /* Phase headers */
  .phase-header:active{background:var(--surface2);transition:background .06s ease}
  /* Float menu items */
  .float-menu-item:active{background:var(--gold-dim);transition:background .06s ease}
  /* Passcode keys — already have their own */
  /* Disable sticky hover states on touch */
  .trade-dot:hover,.set-row:hover,.acct-row:hover,.pal-sw:hover,
  .checklist li:hover,.phase-header:hover,.float-menu-item:hover{
    transform:none;background:unset;border-color:unset;
  }
}

/* 5 — Nav active pill indicator */
#phone-nav button{position:relative}
#phone-nav button.active .pn-icon{filter:drop-shadow(0 0 7px var(--gold))}
#phone-nav button::after{
  content:'';
  position:absolute;
  bottom:4px;left:50%;
  width:20px;height:2.5px;
  border-radius:3px;
  background:var(--gold);
  box-shadow:0 0 10px var(--gold);
  transform:translateX(-50%) scaleX(0);
  transition:transform .35s var(--ease-silk);
}
#phone-nav button.active::after{transform:translateX(-50%) scaleX(1)}

/* ── Pull-to-refresh ── */
#ptr-ind{
  position:fixed;top:78px;left:50%;
  transform:translateX(-50%) translateY(0) scale(0.5);
  opacity:0;z-index:999;
  width:34px;height:34px;border-radius:50%;
  background:var(--void);
  border:1px solid var(--gold-dim);
  box-shadow:0 4px 18px rgba(0,0,0,0.45),0 0 12px var(--gold-glow);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  transition:opacity .3s var(--ease-silk),transform .45s var(--ease-silk);
}
#ptr-ind.ptr-spin svg{animation:ptrspin .7s linear infinite}
@keyframes ptrspin{to{transform:rotate(360deg)}}

/* 6 — Glass surfaces on overlays */
.modal-overlay{backdrop-filter:blur(20px) saturate(130%);-webkit-backdrop-filter:blur(20px) saturate(130%)}
#trade-detail-sheet{
  background:rgba(17,17,16,0.86) !important;
  backdrop-filter:blur(32px) saturate(140%);
  -webkit-backdrop-filter:blur(32px) saturate(140%);
  border:1px solid rgba(255,248,235,0.10);
  border-bottom:none;
  box-shadow:0 -20px 60px rgba(0,0,0,0.5);
}
#month-edit-modal>div,#lesson-modal>div{
  backdrop-filter:blur(28px) saturate(140%);
  -webkit-backdrop-filter:blur(28px) saturate(140%);
}

/* 7 — Money typography drama */
.money-amount{letter-spacing:-1px}
.stat-value{letter-spacing:-0.5px}
#eq-total{letter-spacing:-1px}
.topbar-money-value{letter-spacing:-0.5px}
.card-title.rose::after{background:linear-gradient(90deg,var(--gold),transparent)}
.card-title.sage{color:var(--gold)}
.card-title.sage::after{background:linear-gradient(90deg,var(--gold),transparent)}
.card-title.azure{color:var(--gold)}
.card-title.azure::after{background:linear-gradient(90deg,var(--gold),transparent)}
.card-title.red{color:var(--red)}
.card-title.red::after{background:linear-gradient(90deg,var(--red),transparent)}

/* ═══════════════════════════════════════
   GRIDS
═══════════════════════════════════════ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.g-asym{display:grid;grid-template-columns:3fr 2fr;gap:20px}

/* ═══════════════════════════════════════
   CHECKLIST
═══════════════════════════════════════ */
.checklist{list-style:none}
.checklist li{
  display:flex;
  align-items:flex-start;
  gap:14px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
  color:var(--text2);
  cursor:pointer;
  transition:all .2s var(--ease-silk);
  font-size:13px;
  line-height:1.5;
  user-select:none;
}
.checklist li:last-child{border-bottom:none}
.checklist li.checked{
  color:var(--text3);
}
@media (hover:hover){
  .checklist li:hover{color:var(--gold2);padding-left:4px}
  .checklist li.checked:hover{padding-left:0;color:var(--text3)}
  .checklist li:hover .check-ring{border-color:var(--gold);box-shadow:0 0 8px var(--gold-glow)}
}

.check-ring{
  width:20px;height:20px;
  border-radius:50%;
  border:1px solid var(--border3);
  flex-shrink:0;
  margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s var(--ease-silk);
  position:relative;
}
.checklist li.checked .check-ring{
  background:var(--gold);
  border-color:var(--gold);
  box-shadow:0 0 12px var(--gold-dim);
}
.checklist li.checked .check-ring::after{
  content:'';
  width:5px;height:9px;
  border:1.5px solid rgba(6,6,8,0.9);
  border-top:none;border-left:none;
  transform:rotate(45deg) translateY(-1px);
  display:block;
}

/* ═══════════════════════════════════════
   ICON LAUNCH BUTTONS (open Tape / Mindset)
═══════════════════════════════════════ */
.folder-launch-btn{
  flex:none;
  display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:10px;
  cursor:pointer;
  transition:all .2s var(--ease-silk);
  color:var(--text2);
}
.folder-launch-icon{
  display:block;
  width:15px;height:11px;
  border-radius:1.5px;
  position:relative;
  background:var(--gold2);
  box-shadow:0 0 8px var(--gold-glow);
  flex-shrink:0;
}
.folder-launch-icon::before{
  content:'';
  position:absolute;top:-2px;left:1px;
  width:7px;height:2px;
  border-radius:1.5px 1.5px 0 0;
  background:var(--gold2);
}
.brain-launch-icon{
  color:var(--rose);
  transition:color .2s var(--ease-silk);
}
@media (hover:hover){
  .folder-launch-btn:hover{
    border-color:var(--gold-dim);
    background:var(--gold-dim);
    color:var(--gold2);
  }
  .folder-launch-btn:hover .folder-launch-icon,
  .folder-launch-btn:hover .folder-launch-icon::before{
    background:var(--gold);
  }
  .brain-launch-btn:hover{
    border-color:var(--rose-dim);
    background:var(--rose-dim);
  }
  .brain-launch-btn:hover .brain-launch-icon{
    color:var(--rose);
  }
}
.folder-launch-btn:active{transform:scale(0.92)}

/* ═══════════════════════════════════════
   LUXURY TABLES
═══════════════════════════════════════ */
.lux-table{width:100%;border-collapse:collapse}
.lux-table th{
  text-align:left;
  padding:10px 16px;
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:2.5px;
  color:var(--text3);
  text-transform:uppercase;
  border-bottom:1px solid var(--border2);
}
.lux-table td{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  font-size:12px;
  color:var(--text2);
  transition:color .2s;
}
.lux-table tr:last-child td{border-bottom:none}
.lux-table tbody tr{transition:all .2s}
.lux-table tbody tr:hover td{color:var(--text);background:rgba(255,255,255,0.02)}
.lux-table td.gold{color:var(--gold);font-weight:500}
.lux-table td.sage{color:var(--sage)}
.lux-table td.rose{color:var(--rose)}
.lux-table td.bold{font-weight:600;color:var(--text)}
.lux-table td.num{font-family:var(--font-mono);font-size:11px}

/* ═══════════════════════════════════════
   PHASE BLOCKS
═══════════════════════════════════════ */
.phase-wrap{margin-bottom:12px;border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .3s}
@media (hover:hover){
  .phase-wrap:hover{border-color:var(--gold-dim)}
}
.phase-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 22px;
  cursor:pointer;
  user-select:none;
  background:var(--surface);
  transition:background .2s;
}
.phase-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--rose);
  font-style:normal;
}
.phase-name.gold{color:var(--gold)}
.phase-badge{
  display:flex;align-items:center;gap:10px;
}
.phase-pill{
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:2px;
  color:var(--text3);
  background:var(--surface2);
  border:1px solid var(--border);
  padding:3px 10px;
  border-radius:20px;
}
.phase-chevron{
  color:var(--text3);
  transition:transform .35s var(--ease-silk);
  font-size:12px;
}
.phase-body{
  padding:4px 22px 14px;
  background:var(--void);
  display:block;
  max-height:2000px;
  transition:max-height .5s var(--ease-silk),padding .35s;
  overflow:hidden;
}
.phase-body.collapsed{max-height:0;padding-top:0;padding-bottom:0}
.phase-header.collapsed .phase-chevron{transform:rotate(-90deg)}

/* ═══════════════════════════════════════
   DAILY PAGE
═══════════════════════════════════════ */
.daily-hero{
  font-family:var(--font-serif);
  font-size:clamp(72px,10vw,110px);
  font-weight:900;
  letter-spacing:1px;
  color:var(--text);
  line-height:.92;
  margin-bottom:6px;
  font-style:normal;
}
.daily-hero em{color:var(--gold);font-style:normal}
.daily-tagline{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text3);
  letter-spacing:3px;
  margin-top:6px;
  margin-bottom:36px;
}

/* ═══════════════════════════════════════
   TRADE TRACKER
═══════════════════════════════════════ */
.trade-grid{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:4px;
  padding:4px 2px 6px;
}
.trade-dot{
  width:44px;height:44px;
  border-radius:50%;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text3);
  transition:all .3s var(--ease-silk);
  position:relative;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.trade-dot.done{
  background:var(--gold-dim);
  border-color:var(--gold);
  color:var(--gold);
  box-shadow:0 0 16px var(--gold-glow);
}
.trade-dot.done::after{
  content:'✓';
  position:absolute;
  font-size:12px;
  color:var(--gold);
}
.trade-dot.done span{display:none}

/* ═══════════════════════════════════════
   ROI CALCULATOR
═══════════════════════════════════════ */
.roi-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:20px;
  transition:all .4s var(--ease-silk);
}
@media (hover:hover){
  .roi-card:hover{border-color:var(--border2);box-shadow:0 16px 40px rgba(0,0,0,0.3)}
}
.roi-card-head{
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);
}
.roi-venture{
  font-family:var(--font-serif);
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
  color:var(--text);
  font-style:normal;
}
.roi-partner{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text3);
  letter-spacing:2px;
  margin-top:2px;
}
.roi-invested{
  font-family:var(--font-serif);
  font-size:28px;
  font-weight:700;
  color:var(--gold2);
  letter-spacing:0px;
  font-style:normal;
}
.roi-body{padding:20px 24px}
.roi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.roi-metric{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
}
.roi-metric-label{
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:2px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:6px;
}
.roi-metric-val{
  font-family:var(--font-serif);
  font-size:22px;
  font-weight:700;
  color:var(--sage);
  letter-spacing:0px;
  font-style:normal;
font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
.roi-metric-val.gold{color:var(--gold2)}
.roi-metric-val.rose{color:var(--rose)}

.roi-slider-wrap{margin-top:16px}
.roi-slider-label{
  display:flex;justify-content:space-between;
  font-family:var(--font-mono);font-size:10px;color:var(--text3);
  margin-bottom:8px;letter-spacing:1px;
}
.roi-slider{
  width:100%;
  -webkit-appearance:none;
  appearance:none;
  height:3px;
  border-radius:2px;
  background:var(--border2);
  outline:none;
  cursor:pointer;
  position:relative;
  z-index:10;
  pointer-events:all;
  touch-action:pan-x;
}
.roi-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:20px;height:20px;
  border-radius:50%;
  background:var(--gold);
  cursor:pointer;
  box-shadow:0 0 12px var(--gold);
  transition:transform .2s;
  position:relative;
  z-index:10;
}
.roi-slider::-webkit-slider-thumb:hover{transform:scale(1.3)}

/* ═══════════════════════════════════════
   NEW PLAN FORM
═══════════════════════════════════════ */
.form-group{margin-bottom:20px}
.form-label{
  display:block;
  font-family:var(--font-mono);
  font-size:9px;
  letter-spacing:3px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:8px;
}
.form-input,.form-textarea,.form-select{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  border-radius:12px;
  padding:12px 16px;
  font-family:var(--font-mono);
  font-size:12px;
  outline:none;
  transition:border-color .25s,box-shadow .25s;
  appearance:none;
}
.form-input:focus,.form-textarea:focus,.form-select:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px var(--gold-glow);
}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text3);opacity:1}
.form-textarea{resize:vertical;min-height:140px;line-height:1.7}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn-primary{
  background:var(--gold);
  color:var(--obsidian);
  border:none;
  padding:12px 28px;
  border-radius:12px;
  font-family:var(--font-sans);
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:all .25s var(--ease-silk);
  text-transform:uppercase;
}
@media (hover:hover){
  .btn-primary:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 8px 24px var(--gold-glow)}
}
.btn-ghost{
  background:none;
  color:var(--text3);
  border:1px solid var(--border2);
  padding:12px 24px;
  border-radius:12px;
  font-family:var(--font-sans);
  font-size:12px;
  font-weight:500;
  letter-spacing:.5px;
  cursor:pointer;
  transition:all .2s;
  margin-right:12px;
  text-transform:uppercase;
}
@media (hover:hover){
  .btn-ghost:hover{color:var(--text);border-color:var(--border3)}
}

/* ═══════════════════════════════════════
   CUSTOM PLAN CARDS
═══════════════════════════════════════ */
.plan-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
}
.plan-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:all .4s var(--ease-silk);
}
@media (hover:hover){
  .plan-card:hover{
    border-color:var(--border2);
    transform:translateY(-4px);
    box-shadow:0 24px 48px rgba(0,0,0,0.4);
  }
}
.plan-card-top{
  padding:20px 24px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
}
.plan-card-name{
  font-family:var(--font-serif);
  font-size:18px;
  font-weight:700;
  color:var(--text);
  letter-spacing:0px;
  font-style:normal;
}
.plan-card-date{
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text3);
  letter-spacing:1px;
  margin-top:3px;
}
.plan-tag{
  font-family:var(--font-mono);
  font-size:8px;
  letter-spacing:2px;
  padding:4px 10px;
  border-radius:20px;
  text-transform:uppercase;
  white-space:nowrap;
}
.tag-daily{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-dim)}
.tag-mdp{background:var(--rose-dim);color:var(--rose);border:1px solid var(--rose-dim)}
.tag-scale{background:var(--sage-dim);color:var(--sage);border:1px solid var(--sage-dim)}
.tag-invest{background:var(--azure-dim);color:var(--azure);border:1px solid var(--azure-dim)}
.tag-other{background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border)}
.plan-card-body{padding:16px 24px}
.plan-preview{font-size:12px;color:var(--text3);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.plan-card-foot{
  padding:14px 24px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.prog-track{flex:1;height:2px;background:var(--border2);border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold3));border-radius:1px;transition:width .6s var(--ease-silk)}
.prog-pct{font-family:var(--font-mono);font-size:10px;color:var(--gold);letter-spacing:1px;white-space:nowrap}

/* ═══════════════════════════════════════
   PLAN DETAIL MODAL
═══════════════════════════════════════ */
/* ── WICK'D BRAND CARD ── */
.roi-card.wickd-card{
  border-color:rgba(210,75,25,0.35);
  background:linear-gradient(135deg,#0e0a08 0%,#130d09 50%,#0e0a08 100%);
  position:relative;
  overflow:hidden;
}
.roi-card.wickd-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 80% 20%,rgba(210,75,25,0.18) 0%,transparent 60%);
  pointer-events:none;
}
.roi-card.wickd-card .roi-card-head{
  background:rgba(0,0,0,0.4);
  border-bottom-color:rgba(210,75,25,0.25);
}
.roi-card.wickd-card .roi-venture{color:#f5a060}
.roi-card.wickd-card .roi-partner{color:rgba(245,160,96,0.55)}
.roi-card.wickd-card .roi-invested{color:#e87040}
.roi-card.wickd-card .roi-metric{background:rgba(0,0,0,0.3);border-color:rgba(210,75,25,0.2)}
.roi-card.wickd-card .roi-metric-label{color:rgba(245,160,96,0.5)}
.roi-card.wickd-card .roi-metric-val{color:#e87040}
.roi-card.wickd-card .roi-metric-val.gold{color:#f5a060}
.roi-card.wickd-card .roi-slider{background:rgba(210,75,25,0.3)}
.roi-card.wickd-card .roi-slider-label{color:rgba(245,160,96,0.5)}

/* Wick'd detail page theming */
.wickd-detail .card{
  background:linear-gradient(135deg,#0e0a08,#130d09);
  border-color:rgba(210,75,25,0.25);
}
.wickd-detail .card:hover{border-color:rgba(210,75,25,0.5)}
.wickd-detail .card-accent-line{background:linear-gradient(180deg,transparent,#d24b19,#f5a060,transparent)}
.wickd-detail .stat-card{background:linear-gradient(135deg,#0e0a08,#130d09);border-color:rgba(210,75,25,0.25)}
.wickd-detail .stat-eyebrow{color:rgba(245,160,96,0.5)}
.wickd-detail .stat-value{color:#f5a060}
.wickd-detail .card-title{color:#e87040}
.wickd-detail .card-title::after{background:linear-gradient(90deg,rgba(210,75,25,0.4),transparent)}
.wickd-detail .card-title.azure{color:#e8904a}
.wickd-detail .card-title.sage{color:#d4622a}
.wickd-detail .lux-table th{color:rgba(245,160,96,0.5)}
.wickd-detail .lux-table td{color:rgba(245,160,96,0.75)}
.wickd-detail .lux-table tbody tr:hover td{background:rgba(210,75,25,0.06)}
.wickd-detail .page-title{color:#f5a060}
.wickd-detail .page-eyebrow{color:rgba(245,160,96,0.5)}
.wickd-detail .roi-slider::-webkit-slider-thumb{background:#d24b19;box-shadow:0 0 12px rgba(210,75,25,0.6)}
.wickd-detail .form-input{background:rgba(0,0,0,0.4);border-color:rgba(210,75,25,0.25);color:#f5a060;font-size:16px;
}
.wickd-detail .form-input:focus{border-color:#d24b19;box-shadow:0 0 0 3px rgba(210,75,25,0.1)}
.wickd-detail .btn-gold-sm{background:#d24b19}
.wickd-detail .btn-gold-sm:hover{background:#e05a28}



.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:800;
  background:rgba(6,6,8,0.88);
  backdrop-filter:blur(8px);
  animation:fadeIn .3s var(--ease-silk);
  overflow-y:auto;
  padding:40px;
}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding-top:80px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:24px;
  width:100%;
  max-width:680px;
  overflow:hidden;
  animation:modalUp .4s var(--ease-silk);
  box-shadow:0 48px 96px rgba(0,0,0,0.7),0 0 0 1px var(--gold-glow);
}
.modal-overlay.closing{opacity:0 !important;}
.modal-overlay.closing .modal-box{transform:translateY(20px) scale(0.97);opacity:0;}
.modal-overlay,.modal-box{transition:opacity 0.28s ease;}
.modal-box{transition:transform 0.28s ease, opacity 0.28s ease;}
.modal-head{
  padding:28px 32px;
  border-bottom:1px solid rgba(180,50,50,0.3);
  display:flex;align-items:flex-start;justify-content:space-between;
  background:linear-gradient(135deg,#130a0a,#0e0808);
}
/* Red modal overlay */
.modal-overlay.open .modal-box{
  background:#0e0808;
  border-color:rgba(180,50,50,0.3);
  box-shadow:0 48px 96px rgba(0,0,0,0.8),0 0 0 1px rgba(180,50,50,0.1),0 0 40px rgba(180,50,50,0.06);
}
.modal-overlay.open .modal-body{background:#0e0808}
.modal-overlay.open .modal-title{color:#f0d0d0}
.modal-overlay.open .modal-meta{color:rgba(240,160,160,0.5)}
.modal-overlay.open .checklist li{color:rgba(240,200,200,0.8);border-bottom-color:rgba(180,50,50,0.15)}
.modal-overlay.open .checklist li.checked{color:rgba(180,50,50,0.4)}
.modal-overlay.open .check-ring{border-color:rgba(180,50,50,0.3)}
@media (hover:hover){
  .modal-overlay.open .checklist li:hover{color:#f0d0d0}
  .modal-overlay.open .checklist li:hover .check-ring{border-color:#b43232;box-shadow:0 0 8px rgba(180,50,50,0.25)}
  .modal-overlay.open .btn-close:hover{color:#f0d0d0;border-color:#b43232}
}
.modal-overlay.open .checklist li.checked .check-ring{background:#b43232;border-color:#b43232;box-shadow:0 0 12px rgba(180,50,50,0.4)}
.modal-overlay.open .lux-table th{color:rgba(240,160,160,0.4)}
.modal-overlay.open .lux-table td{color:rgba(240,200,200,0.75);border-bottom-color:rgba(180,50,50,0.12)}
.modal-overlay.open .lux-table tbody tr:hover td{background:rgba(180,50,50,0.05)}
.modal-overlay.open .btn-close{background:#1a0a0a;border-color:rgba(180,50,50,0.3);color:rgba(240,160,160,0.5)}
/* Progress bar red */
.modal-overlay.open .prog-track{background:rgba(180,50,50,0.15)}
.modal-overlay.open .prog-fill{background:linear-gradient(90deg,#b43232,#e05050)}
.modal-overlay.open .prog-pct{color:#e05050}
/* Red plan card accent */
@media (hover:hover){
  .plan-card:hover{border-color:rgba(180,50,50,0.35)}
}
.modal-title{font-family:var(--font-serif);font-size:32px;font-weight:700;letter-spacing:1px;color:var(--text);font-style:normal}
.modal-meta{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin-top:4px}
.btn-close{
  width:36px;height:36px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:50%;
  color:var(--text3);
  font-size:16px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .2s;
  margin-top:2px;
}
@media (hover:hover){
  .btn-close:hover{color:var(--text);border-color:var(--border3);background:var(--surface3)}
}
.modal-body{padding:28px 32px;max-height:65vh;overflow-y:auto}
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:0;color:var(--text3);display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%;min-height:300px}
.empty-glyph{font-family:var(--font-serif);font-size:48px;color:var(--border2);margin-bottom:16px}
.empty-text{font-family:var(--font-mono);font-size:11px;letter-spacing:2px}

/* ══ IDEAS ══ */
:root{
  --purple:var(--gold);
  --ideas-dim:rgba(201,169,110,0.08);
  --ideas-glow:rgba(201,169,110,0.04);
}
.ideas-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
  margin-top:4px;
}
.note-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:all .35s var(--ease-silk);
  position:relative;
}
@media (hover:hover){
  .note-card:hover{
    border-color:var(--gold);
    transform:translateY(-3px);
    box-shadow:0 20px 40px rgba(0,0,0,0.4),0 0 0 1px var(--gold-glow);
  }
}
.note-card-header{
  padding:16px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  background:linear-gradient(135deg,var(--gold-glow),transparent);
}
.note-card-title{
  font-family:var(--font-serif);
  font-size:17px;
  font-weight:700;
  color:var(--text);
  font-style:normal;
  line-height:1.2;
}
.note-card-date{
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text3);
  letter-spacing:1px;
  margin-top:3px;
}
.note-card-body{
  padding:14px 20px;
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text3);
  line-height:1.7;
  overflow:hidden;
  height:84px;
  position:relative;
  word-break:break-word;
}
.note-card-body::after{
  content:'';
  position:absolute;
  left:0;right:0;bottom:0;
  height:28px;
  background:linear-gradient(to bottom, transparent, var(--surface));
  pointer-events:none;
}
.note-card-footer{
  padding:10px 20px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
.note-card-tags{
  display:flex;gap:6px;flex-wrap:wrap;
}
.note-tag{
  font-family:var(--font-mono);
  font-size:8px;
  letter-spacing:1.5px;
  padding:3px 8px;
  border-radius:20px;
  background:var(--gold-dim);
  color:var(--gold);
  border:1px solid var(--gold-dim);
}
.note-card-btns{
  display:flex;gap:6px;flex-shrink:0;
}
.note-icon-btn{
  width:26px;height:26px;
  background:none;
  border:1px solid var(--border2);
  color:var(--text3);
  border-radius:7px;
  cursor:pointer;
  font-size:11px;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
/* Note attachments */
.note-attach{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  background:var(--gold-glow);
  border:1px solid var(--gold-dim);
  border-radius:10px;
  margin-top:8px;
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--gold);
  cursor:pointer;
  transition:all .2s;
}
.note-attach-icon{font-size:14px;flex-shrink:0}
/* Note detail overlay */
.note-overlay{
  display:none;
  position:fixed;inset:0;z-index:900;
  background:rgba(6,5,12,0.92);
  align-items:flex-start;
  padding-top:70px;
  backdrop-filter:blur(10px);
  overflow-y:auto;
  padding:32px;
  opacity:0;
  transition:opacity 0.4s var(--ease-silk);
}
.note-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding-top:80px;}
.note-overlay.shown{opacity:1;}
.note-overlay.closing{opacity:0;}
@keyframes noteBoxIn{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.note-overlay-box{
  background:var(--void);
  border:1px solid var(--border2);
  border-radius:24px;
  width:100%;max-width:760px;
  overflow:hidden;
  box-shadow:0 48px 96px rgba(0,0,0,0.8),0 0 40px var(--gold-glow);
  transform:translateY(28px) scale(0.97);
  opacity:0;
  transition:transform 0.42s var(--ease-silk), opacity 0.32s var(--ease-silk);
  will-change:transform,opacity;
}
.note-overlay.shown .note-overlay-box{transform:translateY(0) scale(1);opacity:1}
.note-overlay.closing .note-overlay-box{
  transition:transform 0.26s ease, opacity 0.24s ease;
  transform:translateY(20px) scale(0.97);
  opacity:0;
}
.note-overlay-head{
  padding:24px 28px;
  border-bottom:1px solid var(--border2);
  background:linear-gradient(135deg,var(--gold-glow),transparent);
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:12px;
}
.note-overlay-title{
  font-family:var(--font-serif);
  font-size:28px;font-weight:900;font-style:normal;
  color:var(--gold);
  flex:1;
  background:none;border:none;outline:none;
  width:100%;
  transition:color .2s;
}
.note-overlay-title:focus{color:var(--gold2)}
.note-overlay-title::placeholder{color:var(--gold-dim);opacity:1}
.note-overlay-meta{
  font-family:var(--font-mono);font-size:9px;
  color:var(--text3);letter-spacing:2px;
  margin-top:4px;
}
.note-overlay-body{
  padding:24px 28px;
  min-height:300px;
  max-height:55vh;
  overflow-y:auto;
}
.note-editor{
  width:100%;min-height:250px;
  background:none;border:none;outline:none;
  font-family:var(--font-mono);font-size:13px;
  color:var(--text);
  line-height:1.9;
  resize:none;
}
.note-editor::placeholder{color:var(--text3);opacity:1}
/* Full-screen notes on phone */
@media (max-width:600px){
  .note-overlay{padding:0 !important;align-items:stretch !important}
  .note-overlay-box{max-width:none !important;width:100% !important;height:100vh;height:100dvh;border-radius:0 !important;border:none !important;display:flex;flex-direction:column;transform:translateY(100%);opacity:1}
  .note-overlay.shown .note-overlay-box{transform:translateY(0)}
  .note-overlay.closing .note-overlay-box{transform:translateY(45%);opacity:0}
  .note-overlay-head{padding-top:calc(16px + env(safe-area-inset-top))}
  .note-overlay-body{flex:1;max-height:none !important;min-height:0;display:flex;flex-direction:column}
  .note-editor{flex:1;min-height:0}
  .note-overlay-foot{padding-bottom:calc(16px + env(safe-area-inset-bottom))}
  .note-swipe-pill{display:block !important}
}
.note-swipe-pill{
  display:none;
  width:36px;height:4px;border-radius:2px;
  background:var(--border2);
  margin:10px auto 0;
}
.note-overlay-foot{
  padding:16px 28px;
  border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.note-attach-list{
  display:flex;gap:8px;flex-wrap:wrap;flex:1;
}
.note-attach-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;
  background:var(--gold-dim);
  border:1px solid var(--border2);
  border-radius:20px;
  font-family:var(--font-mono);font-size:9px;
  color:var(--text2);
  max-width:160px;
  cursor:pointer;
  transition:all .2s;
}
.note-attach-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-file-btn{
  display:flex;align-items:center;gap:6px;
  background:none;border:1px solid var(--border2);
  color:var(--text2);
  padding:7px 14px;border-radius:10px;
  font-family:var(--font-sans);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.note-save-btn{
  background:var(--gold-dim);color:var(--gold);
  border:1.5px solid var(--gold);padding:8px 20px;border-radius:10px;
  font-family:var(--font-sans);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;
  white-space:nowrap;
}
.note-del-btn{
  background:none;border:1px solid rgba(180,50,50,0.3);
  color:rgba(200,100,100,0.6);
  padding:7px 14px;border-radius:10px;
  font-family:var(--font-sans);font-size:11px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
/* Hidden file input */
#ideas-file-input{display:none}

/* MISC */
.note-text{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:1px;font-style:normal;line-height:1.8;margin-bottom:16px}
.hl{color:var(--gold);text-decoration:underline;text-decoration-color:var(--gold)}
.bold-item{color:var(--text);font-weight:500}
.gap-top{margin-top:20px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media (max-width:600px){
  *::-webkit-scrollbar{width:0;display:none}
  *{-ms-overflow-style:none;scrollbar-width:none}
}

/* Hide number input spinners */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}

/* ── RECENTLY DELETED ── */
.deleted-section-label{font-family:var(--font-mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:10px 16px 6px;margin-top:4px}
.deleted-section-label.plans-label{color:#e05050}
.deleted-section-label.ideas-label{color:rgba(160,110,240,0.8)}
.deleted-card{border-radius:14px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:all .2s}
.deleted-card.plan-deleted{background:rgba(180,50,50,0.06);border:1px solid rgba(180,50,50,0.18)}
.deleted-card.idea-deleted{background:rgba(120,60,200,0.06);border:1px solid rgba(120,60,200,0.18)}
.deleted-card-info{flex:1;min-width:0}
.deleted-card-title{font-family:var(--font-serif);font-size:15px;font-weight:600;font-style:normal;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.deleted-card-meta{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:3px}
.deleted-card-actions{display:flex;gap:6px;flex-shrink:0}
.btn-recover{background:rgba(76,175,125,0.12);border:1px solid rgba(76,175,125,0.3);color:var(--sage);padding:5px 12px;border-radius:8px;font-family:var(--font-sans);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-perm-delete{background:rgba(180,50,50,0.1);border:1px solid rgba(180,50,50,0.25);color:#e05050;padding:5px 12px;border-radius:8px;font-family:var(--font-sans);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.trash-empty{text-align:center;padding:32px;font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:2px}

/* ── TABLE BUILDER ── */
.table-builder{display:none;flex-direction:column;gap:0}
.table-builder.active{display:flex}
.table-row-input{display:grid;grid-template-columns:1fr minmax(0,128px);gap:6px;margin-bottom:6px;align-items:center;min-width:0}
.table-row-input input{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:8px 12px;font-family:var(--font-mono);font-size:12px;outline:none;transition:border-color .2s;min-width:0;width:100%;box-sizing:border-box}
.table-row-input input.table-price-input{padding:8px 10px;text-align:right}
.table-row-input input:focus{border-color:var(--gold)}
.table-row-input input::placeholder{color:var(--text3)}
.table-row-del{background:none;border:1px solid var(--border2);color:var(--text3);width:28px;height:34px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-add-row{background:var(--gold-dim);border:1px solid var(--gold-dim);color:var(--gold);padding:7px 16px;border-radius:8px;font-family:var(--font-sans);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px;width:100%}
.table-header-row{display:grid;grid-template-columns:1fr minmax(0,128px);gap:6px;margin-bottom:4px}
.table-header-row .table-col-label:last-child{text-align:right;padding-right:4px}
.table-col-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding-left:2px}

/* ── COUNTER COMPLETE STATE ── */
.card-title [id^="ctr-"].complete,
.card-title .live-counter.complete{
  color:var(--gold) !important;
  background:var(--gold-dim) !important;
  border-color:var(--gold) !important;
}

/* ─── LIGHT MODE ─── */
body.light-mode {
  --obsidian: #f5f0e8;
  --void: #ede8de;
  --surface: #faf7f2;
  --surface2: #f0ebe0;
  --surface3: #e8e0d4;
  --border: rgba(100,80,50,0.10);
  --border2: rgba(100,80,50,0.18);
  --border3: rgba(100,80,50,0.28);
  --gold: #b83d0a;
  --gold2: #d4520f;
  --gold3: #e07030;
  --gold-dim: rgba(184,61,10,0.10);
  --gold-glow: rgba(184,61,10,0.05);
  --champagne: #2a2010;
  --text: #1e180c;
  --text2: #5a4e38;
  --text3: #9a8e78;
  --rose: #9c3820;
  --rose-dim: rgba(156,56,32,0.10);
  --sage: #a05014;
  --sage-dim: rgba(160,80,20,0.10);
  --azure: #8a5828;
  --azure-dim: rgba(138,88,40,0.10);
  --red: #9a2020;
  --red-dim: rgba(154,32,32,0.10);
}
body.light-mode { background: var(--void); }

/* ── Passcode keypad ── */
#pc-keypad,#cpc-keypad{width:100%;padding:0 0 8px;max-width:340px;margin:0 auto}
.pc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:6px 20px}
.pc-key{
  aspect-ratio:1;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:background .15s ease, transform .12s ease;
  position:relative;overflow:hidden;
}
.pc-key:active{background:rgba(255,255,255,0.18);transform:scale(0.88);transition:background 0s,transform .06s ease}
.pc-key.pressed{background:rgba(255,255,255,0.22)}
.pc-num{font-size:28px;font-weight:300;color:var(--text);letter-spacing:0;line-height:1;font-family:var(--font-sans)}
.pc-sub{font-size:8px;letter-spacing:2.5px;color:var(--text3);font-family:var(--font-mono);margin-top:2px}
.pc-key-del,.pc-key-bio{background:none;border-color:transparent}
.pc-key-del svg,.pc-key-bio svg{color:var(--text2)}
.pc-dot{
  width:12px;height:12px;border-radius:50%;
  border:1.5px solid var(--text3);
  background:transparent;
  transition:background .25s var(--ease-silk), border-color .25s var(--ease-silk), transform .3s var(--ease-back);
}
.pc-dot.filled{background:var(--text);border-color:var(--text);transform:scale(1.15)}
.pc-dot.error{border-color:var(--rose);background:var(--rose)}
@keyframes pc-shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.pc-dots-shake{animation:pc-shake .5s cubic-bezier(0.36,0.07,0.19,0.97)}
/* Ripple on keypad tap */
.pc-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.25);transform:scale(0);animation:pc-ripple-anim .4s var(--ease-silk) forwards;pointer-events:none}
@keyframes pc-ripple-anim{to{transform:scale(2.8);opacity:0}}

/* ── Lock mode options ── */
.lock-opt{
  display:flex;align-items:center;gap:14px;
  padding:12px 6px;border-radius:12px;
  background:none;border:none;cursor:pointer;
  width:100%;text-align:left;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s;
}
.lock-opt:active{background:var(--gold-dim)}
.lock-opt-radio{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--border2);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,background .2s;
}
.lock-opt-radio.selected{border-color:var(--gold);}
.lock-opt-radio.selected::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--gold);}
.lock-opt-title{font-family:var(--font-sans);font-size:14px;color:var(--text);font-weight:500}
.lock-opt-sub{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:.5px;margin-top:2px}

/* ── Account / Settings page ── */
/* account-page and change-pc-screen use visibility system -- always display:flex, off-screen until .open */
.acct-section{margin-bottom:28px}
.acct-section-label{font-family:var(--font-mono);font-size:9px;letter-spacing:3px;color:var(--text3);margin-bottom:10px;padding-left:4px}
.acct-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.acct-row{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;width:100%;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.acct-row:active{background:var(--gold-dim)}
.acct-row-label{font-family:var(--font-sans);font-size:15px;color:var(--text);font-weight:400}
.acct-row-val{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:.5px}
.acct-divider{height:1px;background:var(--border);margin:0 18px}
.acct-toggle{width:42px;height:24px;border-radius:12px;background:var(--surface2);border:1px solid var(--border2);position:relative;transition:background .3s var(--ease-silk)}
.acct-toggle.on{background:var(--gold);border-color:var(--gold)}
.acct-toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .3s var(--ease-back);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.acct-toggle.on::after{transform:translateX(18px)}

/* Account page enter/exit animations */
#account-page,#change-pc-screen,#change-pw-screen{
  transform:translateX(100%);
  visibility:hidden;
  pointer-events:none;
  transition:transform .42s var(--ease-silk),visibility 0s .42s;
  will-change:transform;
}
#account-page.open,#change-pc-screen.open,#change-pw-screen.open{
  transform:translateX(0);
  visibility:visible;
  pointer-events:auto;
  transition:transform .42s var(--ease-silk),visibility 0s 0s;
}
#account-page.closing,#change-pc-screen.closing,#change-pw-screen.closing{
  transform:translateX(100%);
}
#settings-backdrop{
  position:fixed;inset:0;z-index:1090;
  background:rgba(0,0,0,0);
  opacity:0;pointer-events:none;
  transition:opacity .3s var(--ease-silk);
}
#phone-settings-wrap.open #settings-backdrop{opacity:1;pointer-events:auto;background:rgba(0,0,0,0.35)}
#settings-menu{
  position:absolute;
  top:calc(100% + 10px);left:0;
  width:248px;
  background:var(--void);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:8px;
  z-index:1100;
  box-shadow:0 24px 60px rgba(0,0,0,0.6),0 0 30px rgba(0,0,0,0.3);
  transform-origin:top left;
  transform:translateY(-8px) scale(0.94);
  opacity:0;pointer-events:none;
  transition:transform .42s var(--ease-silk),opacity .3s var(--ease-silk);
  backdrop-filter:blur(28px);
}
#phone-settings-wrap.open #settings-menu{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}
#phone-settings-wrap.open #phone-settings-btn{border-color:var(--gold);color:var(--gold)}
#phone-settings-icon{transition:transform .6s cubic-bezier(0.34,1.56,0.64,1)}
#phone-settings-wrap.open #phone-settings-icon{transform:rotate(90deg)}
#phone-settings-wrap.closing #phone-settings-icon{transform:rotate(0deg);transition:transform .4s var(--ease-silk)}
#phone-settings-wrap.closing #settings-menu{transform:translateY(-8px) scale(0.94);opacity:0;pointer-events:none;transition:transform .35s var(--ease-silk),opacity .25s var(--ease-silk)}
#phone-settings-wrap.closing #settings-backdrop{opacity:0;pointer-events:none;transition:opacity .3s var(--ease-silk)}
.set-sec{padding:6px 4px;border-bottom:1px solid var(--border)}
.set-sec:last-child{border-bottom:none}
.set-label{font-family:var(--font-mono);font-size:8px;letter-spacing:2.5px;color:var(--text3);padding:4px 8px 8px}
.set-row{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:11px 12px;border-radius:10px;
  background:none;border:none;cursor:pointer;
  font-family:var(--font-sans);font-size:13px;font-weight:500;
  color:var(--text);letter-spacing:.2px;transition:background .15s;
}
.set-row-ic{color:var(--text3);font-size:14px}
.set-logout{color:var(--rose)}
.set-logout .set-row-ic{color:var(--rose)}
.palette-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:4px 8px 8px}
.pal-sw{
  border-radius:12px;cursor:pointer;
  border:2px solid transparent;
  transition:transform .25s var(--ease-silk),border-color .2s,box-shadow .2s;
  position:relative;
  -webkit-tap-highlight-color:transparent;
  height:52px;
  display:flex;align-items:flex-end;
  padding:7px 9px;
  overflow:hidden;
}
.pal-sw::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,0.18) 0%,transparent 60%);
  pointer-events:none;
}
.pal-sw-name{
  font-family:var(--font-mono);
  font-size:8px;letter-spacing:1.5px;font-weight:700;
  color:rgba(255,255,255,0.9);
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
  text-transform:uppercase;
  position:relative;z-index:1;line-height:1;
}
.pal-sw:active{transform:scale(0.93)}
.pal-sw.active{border-color:rgba(255,255,255,0.85);box-shadow:0 0 0 1px rgba(255,255,255,0.25),0 4px 16px rgba(0,0,0,0.3)}
.pal-sw.active::after{
  content:'✓';position:absolute;top:6px;right:8px;
  font-size:11px;font-weight:900;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,0.5);z-index:1;
}
@media (hover:hover){
  .set-row:hover{background:var(--gold-dim)}
  .pal-sw:hover{transform:scale(1.04)}
}

/* ── PNL CALENDAR ── */
.pnl-cell {
  border-radius: 8px;
  padding: 7px 4px 5px;
  text-align: center;
  min-height: 46px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
}
@media (prefers-color-scheme: light) {
  .pnl-cell {
    border: 1px solid rgba(100,70,40,0.12);
    background: rgba(0,0,0,0.02);
  }
  .pnl-green {
    border: 1px solid var(--gold) !important;
  }
  .pnl-red {
    border: 1px solid rgba(160,70,50,0.3) !important;
  }
}
.pnl-cell-date {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  opacity: 0.4;
}
.pnl-cell-val {
  font-family: var(--font-serif);
  font-size: 12px;
  letter-spacing: 0.5px;
}
.pnl-green {
  background: var(--gold-dim);
}
.pnl-green .pnl-cell-date { color: var(--sage); opacity: 0.8; }
.pnl-green .pnl-cell-val { color: var(--gold); }
.pnl-red {
  background: rgba(150,60,40,0.35);
}
.pnl-red .pnl-cell-date { color: var(--rose); opacity: 0.8; }
.pnl-red .pnl-cell-val { color: #e07858; }
.pnl-today {
  outline: 2px solid var(--gold);
  outline-offset: -2px;
}


/* ── VIEW FADE TRANSITION ── */
.view {
  transition: opacity 0.4s ease;
}
.view.fading-out {
  opacity: 0;
  pointer-events: none;
}
.view.fading-in {
  animation: fadeInView 0.4s ease forwards;
}
@keyframes fadeInView {
  from { opacity: 0; }
  to { opacity: 1; }
}


/* ── Spring pop transition for editors ── */
#money-card-editor {
  overflow: hidden;
  transform-origin: top center;
  transform: scaleY(0.6);
  opacity: 0;
  max-height: 0;
  transition: max-height 0.42s cubic-bezier(0.34,1.4,0.64,1),
              opacity 0.2s ease,
              transform 0.42s cubic-bezier(0.34,1.4,0.64,1);
}
#money-card-editor.editor-open {
  max-height: 360px;
  opacity: 1;
  transform: scaleY(1);
}
#monthly-income-editor {
  overflow: hidden;
  transform-origin: top center;
  transform: scaleY(0.6);
  opacity: 0;
  max-height: 0;
  pointer-events: none;
  transition: max-height 0.42s cubic-bezier(0.34,1.4,0.64,1),
              opacity 0.2s ease,
              transform 0.42s cubic-bezier(0.34,1.4,0.64,1);
}
#monthly-income-editor.editor-open {
  max-height: 120px;
  opacity: 1;
  transform: scaleY(1);
  pointer-events: auto;
  margin-top: 8px;
}


/* ── Spring Pop C transition for editors ── */
.editor-spring {
  display: none;
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transform: scaleY(0.7);
  transform-origin: top center;
}
.editor-spring.editor-opening {
  display: block;
  max-height: 0;
  opacity: 0;
  transform: scaleY(0.7);
}
.editor-spring.editor-open {
  display: block;
  max-height: 400px;
  opacity: 1;
  transform: scaleY(1);
  transition: max-height 0.42s cubic-bezier(0.34,1.4,0.64,1),
              opacity 0.22s ease,
              transform 0.42s cubic-bezier(0.34,1.4,0.64,1);
  margin-top: 8px;
}

.editor-spring.editor-closing {
  display: block;
  max-height: 0 !important;
  opacity: 0 !important;
  transform: scaleY(0.7) !important;
  transition: max-height 0.3s ease,
              opacity 0.2s ease,
              transform 0.3s ease;
}
